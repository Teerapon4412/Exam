services:
  - type: web
    name: factory-online-exam
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
    disk:
      name: factory-exam-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
